name: Build PS3 PKG

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/ps3dev/ps3toolchain:latest
    steps:
    - uses: actions/checkout@v4

    - name: Build with PSL1GHT
      run: |
        make

    - name: Upload PKG Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CustomPlayerPKG
        path: ./*.pkg
